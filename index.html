<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>مسبحة الأذكار</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      overscroll-behavior: none;
      font-family: Tahoma, Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.18), transparent 35%),
        linear-gradient(160deg, #064e3b, #0f766e, #16a34a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: stretch;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    body {
      margin: 0;
      width: 100%;
      overflow-x: hidden;
      overscroll-behavior: none;
      min-height: 100vh;
      font-family: Tahoma, Arial, sans-serif;
      background: linear-gradient(160deg, #0f5132, #198754);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    }

    .app {
      width: 100%;
      max-width: 480px;
      height: 100dvh;
      max-height: 100dvh;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 0;
      padding: 18px 18px 14px;
      box-shadow: inset 0 0 80px rgba(255,255,255,0.06);
      backdrop-filter: blur(14px);
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
    }

    h1 {
      margin: 4px 0 8px;
      font-size: clamp(24px, 7vw, 34px);
      letter-spacing: 0.5px;
    }

    .dhikr-box {
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 22px;
      padding: 14px;
      min-height: 86px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(20px, 6vw, 28px);
      line-height: 1.55;
      font-weight: bold;
      box-shadow: 0 12px 26px rgba(0,0,0,0.14);
    }

    select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.3);
      font-size: 16px;
      margin: 0;
      direction: rtl;
      outline: none;
      background: rgba(255,255,255,0.94);
      color: #064e3b;
      font-weight: bold;
    }

    .counter {
      font-size: clamp(58px, 17vw, 92px);
      font-weight: bold;
      margin: 0;
      line-height: 1;
      text-shadow: 0 8px 20px rgba(0,0,0,0.24);
    }
    .target {
      font-size: 15px;
      opacity: 0.92;
      margin: 2px 0 6px;
    }

    .tap-btn {
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      width: min(58vw, 230px);
      height: min(58vw, 230px);
      min-width: 178px;
      min-height: 178px;
      border-radius: 50%;
      border: 9px solid rgba(255, 255, 255, 0.35);
      background:
        radial-gradient(circle at 35% 25%, #ffffff, #ecfdf5 40%, #bbf7d0);
      color: #065f46;
      font-size: clamp(28px, 8vw, 38px);
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 18px 30px rgba(0, 0, 0, 0.30), inset 0 -10px 18px rgba(6,95,70,0.12);
      transition: transform 0.08s ease, box-shadow 0.08s ease;
      margin: 4px auto 8px;
      display: block;
    }

    .tap-btn:active { transform: scale(0.96); }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 0;
    }

    button, select {
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    button.small {
      border: none;
      border-radius: 16px;
      padding: 12px 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.92);
      color: #065f46;
      box-shadow: 0 8px 18px rgba(0,0,0,0.14);
    }

    button.danger {
      grid-column: span 2;
      background: #fff3cd;
      color: #664d03;
    }

    .progress-wrap {
      height: 11px;
      width: 100%;
      background: rgba(255, 255, 255, 0.24);
      border-radius: 20px;
      overflow: hidden;
      margin: 6px 0 8px;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: #ffffff;
      border-radius: 20px;
      transition: width 0.2s;
    }

    .message {
      min-height: 22px;
      font-size: 15px;
      margin-top: 4px;
      color: #fef3c7;
      font-weight: bold;
    }

    .date-info {
      margin-top: 0;
      font-size: 12px;
      opacity: 0.8;
    }

    footer {
      margin-top: 2px;
      font-size: 12px;
      opacity: 0.75;
    }

    .top-section,
    .middle-section,
    .bottom-section {
      width: 100%;
    }

    @media (max-height: 720px) {
      .app { padding: 12px; gap: 5px; }
      h1 { font-size: 24px; margin-bottom: 4px; }
      .dhikr-box { min-height: 72px; font-size: 20px; padding: 10px; }
      .tap-btn { width: 178px; height: 178px; min-width: 160px; min-height: 160px; }
      button.small { padding: 10px 8px; font-size: 14px; }
      footer, .date-info { display: none; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="top-section">
      <h1>مسبحة الأذكار</h1>
      <select id="dhikrSelect" onchange="changeDhikr()"></select>
      <div class="dhikr-box" id="dhikrText">سبحان الله</div>
    </div>

    <div class="middle-section">
      <div class="counter" id="counter">0</div>
      <div class="target" id="targetText">الهدف: 33 مرة</div>
      <div class="progress-wrap">
        <div class="progress" id="progress"></div>
      </div>
      <button class="tap-btn" onclick="countTasbeeh()">اضغط</button>
    </div>

    <div class="bottom-section">
      <div class="buttons">
        <button class="small" onclick="addNewDhikr()">إضافة ذكر</button>
        <button class="small" onclick="deleteCurrentDhikr()">حذف الذكر</button>
        <button class="small" onclick="resetCurrentDhikr()">تصفير هذا الذكر</button>
        <button class="small" onclick="nextDhikr()">الذكر التالي</button>
        <button class="small danger" onclick="resetAllAdhkar()">تصفير كل الأذكار يدويًا</button>
      </div>

      <div class="message" id="message"></div>
      <div class="date-info" id="dateInfo"></div>
      <footer>الحفظ تلقائي والتصفير يومي</footer>
    </div>
  </main>

  <script>
    const STORAGE_KEY = "acer_azkar_tasbeeh_data_v1";
    const ADHKAR_STORAGE_KEY = "acer_azkar_custom_adhkar_v1";

    let adhkar = [
      { text: "سبحان الله", target: 33 },
      { text: "الحمد لله", target: 33 },
      { text: "الله أكبر", target: 34 },
      { text: "لا إله إلا الله", target: 100 },
      { text: "أستغفر الله", target: 100 },
      { text: "لا حول ولا قوة إلا بالله", target: 100 },
      { text: "سبحان الله وبحمده", target: 100 },
      { text: "سبحان الله العظيم", target: 100 },
      { text: "اللهم صل وسلم على نبينا محمد", target: 100 },
      { text: "حسبي الله ونعم الوكيل", target: 100 },
      { text: "اللهم اغفر لي وارحمني", target: 100 },
      { text: "ربنا آتنا في الدنيا حسنة وفي الآخرة حسنة وقنا عذاب النار", target: 10 },
      { text: "اللهم إنك عفو تحب العفو فاعف عني", target: 10 },
      { text: "رضيت بالله ربًا وبالإسلام دينًا وبمحمد ﷺ نبيًا", target: 3 },
      { text: "اللهم أعني على ذكرك وشكرك وحسن عبادتك", target: 10 }
    ];

    let currentIndex = 0;
    let counts = Array(adhkar.length).fill(0);

    const dhikrText = document.getElementById("dhikrText");
    const counter = document.getElementById("counter");
    const targetText = document.getElementById("targetText");
    const progress = document.getElementById("progress");
    const message = document.getElementById("message");
    const dhikrSelect = document.getElementById("dhikrSelect");
    const dateInfo = document.getElementById("dateInfo");

    function getTodayKey() {
      const today = new Date();
      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, "0");
      const day = String(today.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function saveAdhkarList() {
      localStorage.setItem(ADHKAR_STORAGE_KEY, JSON.stringify(adhkar));
    }

    function loadAdhkarList() {
      const savedAdhkar = localStorage.getItem(ADHKAR_STORAGE_KEY);

      if (!savedAdhkar) {
        saveAdhkarList();
        return;
      }

      try {
        const parsed = JSON.parse(savedAdhkar);
        if (Array.isArray(parsed) && parsed.length > 0) {
          adhkar = parsed;
        }
      } catch (e) {
        console.error(e);
      }
    }

    function buildDhikrList() {
      dhikrSelect.innerHTML = "";

      adhkar.forEach((item, index) => {
        const option = document.createElement("option");
        option.value = index;
        const savedCount = counts[index] || 0;
        option.textContent = item.text + " — " + savedCount;
        dhikrSelect.appendChild(option);
      });

      dhikrSelect.value = currentIndex;
    }

    function loadData() {
      const todayKey = getTodayKey();
      const saved = localStorage.getItem(STORAGE_KEY);

      if (!saved) {
        saveData();
        return;
      }

      try {
        const data = JSON.parse(saved);

        // تصفير تلقائي إذا تغير اليوم
        if (data.date !== todayKey) {
          counts = Array(adhkar.length).fill(0);
          currentIndex = 0;
          saveData();
          return;
        }

        counts = Array.isArray(data.counts) ? data.counts : Array(adhkar.length).fill(0);
        currentIndex = typeof data.currentIndex === "number" ? data.currentIndex : 0;

        // حماية إذا تغير عدد الأذكار لاحقًا
        while (counts.length < adhkar.length) counts.push(0);
        counts = counts.slice(0, adhkar.length);

      } catch (error) {
        counts = Array(adhkar.length).fill(0);
        currentIndex = 0;
        saveData();
      }
    }

    function saveData() {
      const data = {
        date: getTodayKey(),
        currentIndex: currentIndex,
        counts: counts
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function updateScreen() {
      buildDhikrList();
      const current = adhkar[currentIndex];
      const count = counts[currentIndex];

      dhikrSelect.value = currentIndex;
      dhikrText.textContent = current.text;
      counter.textContent = count;
      targetText.textContent = "الهدف: " + current.target + " مرة";
      dateInfo.textContent = "تاريخ اليوم: " + getTodayKey();

      const percent = Math.min((count / current.target) * 100, 100);
      progress.style.width = percent + "%";

      if (count === current.target) {
        message.textContent = "أكملت هدف هذا الذكر، بارك الله فيك";
        vibratePhone(120);
      } else if (count > current.target) {
        message.textContent = "يمكنك الاستمرار أو الانتقال للذكر التالي";
      } else {
        message.textContent = "";
      }
    }

    function countTasbeeh() {
      counts[currentIndex]++;
      saveData();
      updateScreen();
      vibratePhone(20);
    }

    function resetCurrentDhikr() {
      counts[currentIndex] = 0;
      saveData();
      updateScreen();
    }

    function resetAllAdhkar() {
      const confirmReset = confirm("هل تريد تصفير كل الأذكار؟");
      if (!confirmReset) return;

      counts = Array(adhkar.length).fill(0);
      saveData();
      updateScreen();
    }

    function changeDhikr() {
      currentIndex = Number(dhikrSelect.value);
      saveData();
      updateScreen();
    }

    function nextDhikr() {
      currentIndex = (currentIndex + 1) % adhkar.length;
      saveData();
      updateScreen();
    }

    function addNewDhikr() {
      const text = prompt("اكتب الذكر الجديد");
      if (!text || !text.trim()) return;

      const targetInput = prompt("كم العدد المستهدف؟", "100");
      let target = parseInt(targetInput);

      if (isNaN(target) || target <= 0) {
        target = 100;
      }

      adhkar.push({
        text: text.trim(),
        target: target
      });

      counts.push(0);
      currentIndex = adhkar.length - 1;

      saveAdhkarList();
      saveData();
      buildDhikrList();
      updateScreen();
    }

    function deleteCurrentDhikr() {
      if (adhkar.length <= 1) {
        alert("لا يمكن حذف آخر ذكر");
        return;
      }

      const currentName = adhkar[currentIndex].text;
      const confirmDelete = confirm("هل تريد حذف هذا الذكر؟" + currentName);

      if (!confirmDelete) return;

      adhkar.splice(currentIndex, 1);
      counts.splice(currentIndex, 1);

      if (currentIndex >= adhkar.length) {
        currentIndex = adhkar.length - 1;
      }

      saveAdhkarList();
      saveData();
      buildDhikrList();
      updateScreen();
    }

    function vibratePhone(duration = 80) {
      if (navigator.vibrate) {
        navigator.vibrate(duration);
      }
    }

    loadAdhkarList();
    loadData();
    buildDhikrList();
    updateScreen();
  </script>
</body>
</html>
