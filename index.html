<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>مسبحة الأذكار</title>

  <style>
    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,
    body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#0b6b43;
      touch-action:manipulation;
      -webkit-text-size-adjust:100%;
      font-family:Tahoma,Arial,sans-serif;
    }

    body{
      min-height:100svh;
      min-height:100dvh;

      background:
        radial-gradient(circle at top,
        rgba(255,255,255,0.15),
        transparent 35%),

        linear-gradient(
          160deg,
          #064e3b,
          #0f766e,
          #16a34a
        );

      color:white;

      display:flex;
      justify-content:center;
      align-items:center;
    }

    .app{
      width:100%;
      max-width:500px;

      height:100svh;
      height:100dvh;

      margin:0;
      border-radius:0;

      padding-top:max(10px, env(safe-area-inset-top));
      padding-bottom:max(10px, env(safe-area-inset-bottom));
      padding-left:14px;
      padding-right:14px;

      overflow:hidden;

      display:flex;
      flex-direction:column;
      justify-content:space-evenly;

      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(12px);
    }

    h1{
      margin:0;
      text-align:center;
      font-size:clamp(28px,7vw,40px);
      font-weight:bold;
    }

    select{
      width:100%;
      border:none;
      outline:none;
      border-radius:18px;
      padding:14px;
      font-size:17px;
      font-weight:bold;
      background:white;
      color:#064e3b;
      margin-top:10px;
    }

    .dhikr-box{
      width:100%;
      min-height:90px;

      margin-top:12px;

      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;

      padding:14px;

      border-radius:22px;

      background:rgba(255,255,255,0.18);

      border:1px solid rgba(255,255,255,0.2);

      font-size:clamp(22px,5vw,32px);
      font-weight:bold;
      line-height:1.6;

      box-shadow:0 10px 30px rgba(0,0,0,0.15);
    }

    .counter{
      text-align:center;
      font-size:clamp(70px,18vw,110px);
      font-weight:bold;
      line-height:1;
      margin-top:6px;
    }

    .target{
      text-align:center;
      font-size:15px;
      opacity:0.9;
      margin-top:4px;
    }

    .progress-wrap{
      width:100%;
      height:12px;
      border-radius:20px;
      overflow:hidden;

      margin-top:14px;

      background:rgba(255,255,255,0.22);
    }

    .progress{
      height:100%;
      width:0%;
      background:white;
      transition:0.2s;
    }

    .tap-btn{
      width:min(58vw,240px);
      height:min(58vw,240px);

      min-width:180px;
      min-height:180px;

      margin:16px auto 10px;

      border-radius:50%;
      border:9px solid rgba(255,255,255,0.35);

      background:
        radial-gradient(circle at 35% 25%,
        #ffffff,
        #ecfdf5 40%,
        #bbf7d0);

      color:#065f46;

      font-size:clamp(30px,8vw,42px);
      font-weight:bold;

      cursor:pointer;

      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;

      touch-action:manipulation;

      box-shadow:
        0 18px 30px rgba(0,0,0,0.30),
        inset 0 -10px 18px rgba(6,95,70,0.12);

      transition:0.08s;
    }

    .tap-btn:active{
      transform:scale(0.96);
    }

    .buttons{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;

      margin-top:10px;
    }

    .small{
      border:none;
      border-radius:18px;

      padding:13px 10px;

      font-size:15px;
      font-weight:bold;

      cursor:pointer;

      background:rgba(255,255,255,0.95);
      color:#065f46;

      box-shadow:0 8px 20px rgba(0,0,0,0.12);
    }

    .danger{
      grid-column:span 2;
      background:#fff3cd;
      color:#664d03;
    }

    .message{
      text-align:center;
      min-height:20px;
      margin-top:6px;
      color:#fef3c7;
      font-size:14px;
      font-weight:bold;
    }

    .date-info{
      text-align:center;
      font-size:12px;
      opacity:0.8;
      margin-top:4px;
    }

    footer{
      text-align:center;
      font-size:12px;
      opacity:0.75;
      margin-top:2px;
    }

    @media (max-height:700px){

      .tap-btn{
        width:170px;
        height:170px;
        min-width:170px;
        min-height:170px;
      }

      .dhikr-box{
        min-height:72px;
      }

      .counter{
        font-size:70px;
      }

      footer,
      .date-info{
        display:none;
      }
    }

  </style>
</head>

<body>

<div class="app">

  <div>

    <h1>مسبحة الأذكار</h1>

    <select id="dhikrSelect"
            onchange="changeDhikr()"></select>

    <div class="dhikr-box"
         id="dhikrText">
      سبحان الله
    </div>

  </div>

  <div>

    <div class="counter"
         id="counter">
      0
    </div>

    <div class="target"
         id="targetText">
      الهدف: 33 مرة
    </div>

    <div class="progress-wrap">
      <div class="progress"
           id="progress"></div>
    </div>

    <button class="tap-btn"
            onclick="countTasbeeh()">
      اضغط
    </button>

  </div>

  <div>

    <div class="buttons">

      <button class="small"
              onclick="addNewDhikr()">
        إضافة ذكر
      </button>

      <button class="small"
              onclick="deleteCurrentDhikr()">
        حذف الذكر
      </button>

      <button class="small"
              onclick="nextDhikr()">
        الذكر التالي
      </button>

      <button class="small"
              onclick="resetCurrentDhikr()">
        تصفير هذا الذكر
      </button>

      <button class="small danger"
              onclick="resetAllAdhkar()">
        تصفير كل الأذكار
      </button>

    </div>

    <div class="message"
         id="message"></div>

    <div class="date-info"
         id="dateInfo"></div>

    <footer>
      الحفظ تلقائي والتصفير يومي
    </footer>

  </div>

</div>

<script>

const STORAGE_KEY =
"acer_azkar_tasbeeh_data_v1";

const ADHKAR_STORAGE_KEY =
"acer_azkar_custom_adhkar_v1";

let adhkar = [

  { text:"سبحان الله", target:33 },
  { text:"الحمد لله", target:33 },
  { text:"الله أكبر", target:34 },
  { text:"لا إله إلا الله", target:100 },
  { text:"أستغفر الله", target:100 },
  { text:"لا حول ولا قوة إلا بالله", target:100 },
  { text:"سبحان الله وبحمده", target:100 },
  { text:"سبحان الله العظيم", target:100 },
  { text:"اللهم صل وسلم على نبينا محمد", target:100 }

];

let currentIndex = 0;

let counts =
Array(adhkar.length).fill(0);

const dhikrText =
document.getElementById("dhikrText");

const counter =
document.getElementById("counter");

const targetText =
document.getElementById("targetText");

const progress =
document.getElementById("progress");

const message =
document.getElementById("message");

const dhikrSelect =
document.getElementById("dhikrSelect");

const dateInfo =
document.getElementById("dateInfo");

function getTodayKey(){

  const today = new Date();

  return today.getFullYear() + "-" +
  String(today.getMonth()+1).padStart(2,"0") + "-" +
  String(today.getDate()).padStart(2,"0");
}

function saveAdhkarList(){

  localStorage.setItem(
    ADHKAR_STORAGE_KEY,
    JSON.stringify(adhkar)
  );
}

function loadAdhkarList(){

  const saved =
  localStorage.getItem(
    ADHKAR_STORAGE_KEY
  );

  if(!saved){
    saveAdhkarList();
    return;
  }

  try{

    const parsed =
    JSON.parse(saved);

    if(Array.isArray(parsed)
       && parsed.length > 0){

      adhkar = parsed;
    }

  }catch(e){}
}

function saveData(){

  localStorage.setItem(
    STORAGE_KEY,

    JSON.stringify({

      date:getTodayKey(),
      counts:counts,
      currentIndex:currentIndex

    })
  );
}

function loadData(){

  const saved =
  localStorage.getItem(STORAGE_KEY);

  if(!saved){
    saveData();
    return;
  }

  try{

    const data =
    JSON.parse(saved);

    if(data.date !== getTodayKey()){

      counts =
      Array(adhkar.length).fill(0);

      currentIndex = 0;

      saveData();

      return;
    }

    counts =
    Array.isArray(data.counts)
    ? data.counts
    : Array(adhkar.length).fill(0);

    currentIndex =
    typeof data.currentIndex === "number"
    ? data.currentIndex
    : 0;

  }catch(e){}
}

function buildDhikrList(){

  dhikrSelect.innerHTML = "";

  adhkar.forEach((item,index)=>{

    const option =
    document.createElement("option");

    option.value = index;

    option.textContent =
    item.text +
    " — " +
    (counts[index] || 0);

    dhikrSelect.appendChild(option);
  });

  dhikrSelect.value =
  currentIndex;
}

function updateScreen(){

  buildDhikrList();

  const current =
  adhkar[currentIndex];

  const count =
  counts[currentIndex];

  dhikrText.textContent =
  current.text;

  counter.textContent =
  count;

  targetText.textContent =
  "الهدف: " +
  current.target +
  " مرة";

  dateInfo.textContent =
  "تاريخ اليوم: " +
  getTodayKey();

  const percent =
  Math.min(
    (count/current.target)*100,
    100
  );

  progress.style.width =
  percent + "%";

  if(count === current.target){

    message.textContent =
    "أكملت الهدف، بارك الله فيك";

    vibratePhone(120);

  }else{

    message.textContent = "";
  }
}

function countTasbeeh(){

  counts[currentIndex]++;

  saveData();

  updateScreen();

  vibratePhone(20);
}

function resetCurrentDhikr(){

  counts[currentIndex] = 0;

  saveData();

  updateScreen();
}

function resetAllAdhkar(){

  const ok =
  confirm("هل تريد تصفير كل الأذكار؟");

  if(!ok) return;

  counts =
  Array(adhkar.length).fill(0);

  saveData();

  updateScreen();
}

function nextDhikr(){

  currentIndex =
  (currentIndex + 1)
  % adhkar.length;

  saveData();

  updateScreen();
}

function changeDhikr(){

  currentIndex =
  Number(dhikrSelect.value);

  saveData();

  updateScreen();
}

function addNewDhikr(){

  const text =
  prompt("اكتب الذكر الجديد");

  if(!text || !text.trim())
    return;

  const targetInput =
  prompt("كم العدد المستهدف؟","100");

  let target =
  parseInt(targetInput);

  if(isNaN(target) || target <= 0)
    target = 100;

  adhkar.push({

    text:text.trim(),
    target:target

  });

  counts.push(0);

  currentIndex =
  adhkar.length - 1;

  saveAdhkarList();

  saveData();

  updateScreen();
}

function deleteCurrentDhikr(){

  if(adhkar.length <= 1){

    alert("لا يمكن حذف آخر ذكر");

    return;
  }

  const ok =
  confirm(
    "هل تريد حذف هذا الذكر؟"
  );

  if(!ok) return;

  adhkar.splice(currentIndex,1);

  counts.splice(currentIndex,1);

  if(currentIndex >= adhkar.length){

    currentIndex =
    adhkar.length - 1;
  }

  saveAdhkarList();

  saveData();

  updateScreen();
}

function vibratePhone(duration=80){

  if(navigator.vibrate){

    navigator.vibrate(duration);
  }
}

loadAdhkarList();
loadData();
updateScreen();

</script>

</body>
</html>
